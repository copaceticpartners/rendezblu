<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — RendezBlu</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .contact-hero {
      background: var(--navy);
      padding: 8rem 2rem 4rem;
      text-align: center;
    }
    .contact-hero-title {
      font-family: var(--display);
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .contact-hero-sub {
      font-family: var(--body);
      font-size: 16px;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
    }
    .contact-body {
      max-width: 560px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .form-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ocean);
      margin-bottom: 0.25rem;
      display: block;
    }
    .form-input {
      width: 100%;
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--body);
      font-size: 14px;
      color: var(--navy);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--ocean); }
    .form-textarea {
      width: 100%;
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--body);
      font-size: 14px;
      color: var(--navy);
      outline: none;
      resize: vertical;
      min-height: 160px;
      transition: border-color 0.2s;
    }
    .form-textarea:focus { border-color: var(--ocean); }
    .form-submit {
      display: inline-block;
      background: var(--ocean);
      color: #fff;
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }
    .form-submit:hover { background: var(--navy); }
  </style>
</head>
<body>

  <header class="sticky-nav" id="mainNav">
    <a href="/" class="sticky-logo">Rendez<span>Blu</span></a>
    <div class="nav-right">
      <a href="/guides.html" class="nav-guides-link">Guides</a>
      <a href="/gear.html" class="nav-shop-btn">Shop Gear</a>
    </div>
  </header>

  <div class="contact-hero">
    <div class="contact-hero-title">Contact</div>
    <div class="contact-hero-sub">Hit us up for any questions, collabs, or to talk shop — we're here!</div>
    <a href="mailto:partners@copaceticpartners.com" style="display:inline-block;margin-top:1rem;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:#5BA8D4;letter-spacing:0.04em;text-decoration:none;">partners@copaceticpartners.com</a>
  </div>

  <div class="contact-body">
    <form class="contact-form" action="https://formspree.io/f/xaqdrjep" method="POST">
      <input type="hidden" name="_replyto" value="partners@copaceticpartners.com" />
      <input type="hidden" name="_subject" value="RendezBlu Contact Form" />
      <div>
        <label class="form-label" for="email">Your email</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>
      <div>
        <label class="form-label" for="message">Message</label>
        <textarea class="form-textarea" id="message" name="message" placeholder="What do we have cooking..." required></textarea>
      </div>
      <button class="form-submit" type="submit">Send it →</button>
    </form>
  </div>

  <footer class="footer-wrap">
    <div class="footer container">
      <div class="footer-left">
        <div class="footer-logo">Rendez<span class="footer-logo-blu">Blu</span></div>
        <div class="footer-tagline">where blu meets blu.</div>
      </div>
      <div class="footer-right"><a href="/contact.html" style="font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:var(--ocean);color:#fff;padding:7px 16px;border-radius:100px;text-decoration:none;margin-right:1rem;">Contact</a>© 2026 RendezBlu</div>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('mainNav');
    if (nav) window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));
  </script>

</body>
</html>
