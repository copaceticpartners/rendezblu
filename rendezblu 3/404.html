<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — RendezBlu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Syne+Mono:wght@400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF8F4;
      color: #0D2137;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #0D2137;
      text-decoration: none;
      margin-bottom: 3rem;
      display: block;
    }

    .logo-blu { color: #1A5C8A; }

    .eyebrow {
      font-family: 'Syne Mono', monospace;
      font-size: 11px;
      color: #1A5C8A;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
    }

    .heading {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    .heading-blu { color: #1A5C8A; }

    .sub {
      font-size: 15px;
      color: #7A6E62;
      line-height: 1.8;
      font-weight: 300;
      max-width: 320px;
      margin: 0 auto 2.5rem;
    }

    .back {
      display: inline-block;
      background: #1A5C8A;
      color: #FAF8F4;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 13px 26px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .back:hover { background: #0D2137; }

    .footer-tagline {
      margin-top: 3rem;
      display: flex;
      align-items: baseline;
      gap: 4px;
      justify-content: center;
    }

    .footer-where { font-size: 11px; color: #9E9488; font-style: italic; }
    .footer-blu1 { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: #1A5C8A; letter-spacing: -0.02em; }
    .footer-meets { font-size: 11px; color: #0D2137; font-weight: 400; padding: 0 2px; }
    .footer-blu2 { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: #2E86C1; letter-spacing: -0.02em; }
  </style>
</head>
<body>

  <a href="/" class="logo">Rendez<span class="logo-blu">Blu</span></a>

  <div class="eyebrow">// coming soon</div>
  <div class="heading">Still <span class="heading-blu">paddling</span><br/>this one out.</div>
  <p class="sub">This page is on its way. Head back to the homepage while we gear up.</p>
  <a href="/" class="back">Back to home</a>

  <div class="footer-tagline">
    <span class="footer-where">where</span>
    <span class="footer-blu1">blu</span>
    <span class="footer-meets">meets</span>
    <span class="footer-blu2">blu.</span>
  </div>

</body>
</html>
